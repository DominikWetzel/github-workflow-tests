name: Bootstrap Repository

# This workflow runs automatically whenever the DOMI-123 feature branch is
# pushed to. It is idempotent: it only creates branches/PRs if they do not
# already exist. Once the repository is fully set up this workflow does nothing.
#
# Branches created:
#   master          – base release branch (workflows, no feature files)
#   version/5.x.x  – version release branch (from master)
#   DOMI-345        – feature branch (from version/5.x.x, adds bar.txt)
#
# Pull requests created:
#   DOMI-123  → master          (updates existing PR #1)
#   DOMI-345  → version/5.x.x  (new PR)

on:
  push:
    branches:
      - copilot/domi-123-foo-changes

permissions:
  contents: write
  pull-requests: write

jobs:
  bootstrap:
    name: Bootstrap branches and PRs
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      OWNER: ${{ github.repository_owner }}
      REPO:  ${{ github.event.repository.name }}

    steps:
      - name: Checkout DOMI-123 branch
        uses: actions/checkout@v4
        with:
          ref: copilot/domi-123-foo-changes
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # -----------------------------------------------------------------------
      # Create master branch (idempotent)
      # -----------------------------------------------------------------------
      - name: Create master branch if missing
        run: |
          if git ls-remote --exit-code origin master > /dev/null 2>&1; then
            echo "ℹ️  master branch already exists – skipping."
          else
            echo "🌿 Creating master branch …"
            git checkout -b master
            git rm --cached foo.txt 2>/dev/null || true
            rm -f foo.txt
            git commit -m "chore: set up master branch with release workflows"
            git push origin master
            echo "✅ master branch created."
          fi
          # Switch back to the DOMI-123 branch for subsequent steps
          git checkout copilot/domi-123-foo-changes

      # -----------------------------------------------------------------------
      # Create version/5.x.x branch (idempotent)
      # -----------------------------------------------------------------------
      - name: Create version/5.x.x branch if missing
        run: |
          if git ls-remote --exit-code origin "version/5.x.x" > /dev/null 2>&1; then
            echo "ℹ️  version/5.x.x branch already exists – skipping."
          else
            echo "🌿 Creating version/5.x.x branch from master …"
            git fetch origin master:master
            git checkout -b "version/5.x.x" master
            git push origin "version/5.x.x"
            echo "✅ version/5.x.x branch created."
          fi
          git checkout copilot/domi-123-foo-changes

      # -----------------------------------------------------------------------
      # Create DOMI-345 feature branch (idempotent)
      # -----------------------------------------------------------------------
      - name: Create DOMI-345 branch if missing
        run: |
          if git ls-remote --exit-code origin "DOMI-345" > /dev/null 2>&1; then
            echo "ℹ️  DOMI-345 branch already exists – skipping."
          else
            echo "🌿 Creating DOMI-345 branch from version/5.x.x …"
            git fetch origin "version/5.x.x:version/5.x.x"
            git checkout -b "DOMI-345" "version/5.x.x"
            echo "bar changes from feature branch DOMI-345" > bar.txt
            git add bar.txt
            git commit -m "feat: add bar.txt from feature branch DOMI-345"
            git push origin "DOMI-345"
            echo "✅ DOMI-345 branch created."
          fi
          git checkout copilot/domi-123-foo-changes

      # -----------------------------------------------------------------------
      # Retarget PR #1 (DOMI-123) to master
      # -----------------------------------------------------------------------
      - name: Retarget PR #1 to master
        run: |
          CURRENT_BASE=$(gh pr view 1 \
            --repo "$OWNER/$REPO" \
            --json baseRefName \
            --jq '.baseRefName' 2>/dev/null || echo "unknown")

          if [[ "$CURRENT_BASE" == "master" ]]; then
            echo "ℹ️  PR #1 already targets master – skipping."
          else
            echo "🔄 Retargeting PR #1 → master …"
            gh pr edit 1 \
              --repo "$OWNER/$REPO" \
              --base master \
              --title "Add foo changes in feature branch DOMI-123" \
              --body "Foo changes from feature branch DOMI-123, targeting the master branch." \
              2>&1 && echo "✅ PR #1 updated." \
              || echo "⚠️  Could not update PR #1."
          fi

      # -----------------------------------------------------------------------
      # Create PR: DOMI-345 → version/5.x.x (idempotent)
      # -----------------------------------------------------------------------
      - name: Create PR for DOMI-345 → version/5.x.x if missing
        run: |
          EXISTING=$(gh pr list \
            --repo "$OWNER/$REPO" \
            --head "DOMI-345" \
            --base "version/5.x.x" \
            --json number \
            --jq '.[].number' 2>/dev/null)

          if [[ -n "$EXISTING" ]]; then
            echo "ℹ️  PR DOMI-345 → version/5.x.x already exists (#$EXISTING) – skipping."
          else
            echo "📬 Creating PR DOMI-345 → version/5.x.x …"
            gh pr create \
              --repo "$OWNER/$REPO" \
              --title "Add bar changes in feature branch DOMI-345" \
              --body "Bar changes from feature branch DOMI-345, targeting the version/5.x.x branch." \
              --base "version/5.x.x" \
              --head "DOMI-345" \
              2>&1 && echo "✅ PR created." \
              || echo "⚠️  Could not create PR."
          fi
