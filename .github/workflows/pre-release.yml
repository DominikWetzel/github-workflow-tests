name: Pre-Release

on:
  workflow_call:
    inputs:
      base-branch:
        required: true
        type: string

jobs:
  pre-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Create shadow branch
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const ref = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `heads/${{ inputs.base-branch }}`
            });
            const sha = ref.data.object.sha;
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/heads/${{ inputs.base-branch }}-shadow`,
              sha
            });
            console.log(`Created shadow branch: ${{ inputs.base-branch }}-shadow at ${sha}`);

      - name: Redirect open PRs to shadow branch
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pulls = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              base: '${{ inputs.base-branch }}',
              state: 'open'
            });
            console.log(`Found ${pulls.length} open PR(s) targeting ${{ inputs.base-branch }}`);
            for (const pr of pulls) {
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                base: '${{ inputs.base-branch }}-shadow'
              });
              console.log(`Redirected PR #${pr.number} "${pr.title}" to shadow branch`);
            }
