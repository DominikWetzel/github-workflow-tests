name: Release

on:
  workflow_dispatch:

jobs:
  pre-release:
    if: github.ref_name == 'master' || startsWith(github.ref_name, 'version/')
    permissions:
      contents: write
      statuses: write
      pull-requests: write
    uses: ./.github/workflows/pre-release.yml
    with:
      base-branch: ${{ github.ref_name }}
    secrets: inherit

  build:
    needs: pre-release
    uses: ./.github/workflows/build.yml
    with:
      cypress-test-all-browsers: true
    secrets: inherit

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Simulate release (0.5 min wait)
        run: sleep 30

  post-release:
    needs: release
    if: always()
    permissions:
      contents: write
      statuses: write
      pull-requests: write
    uses: ./.github/workflows/post-release.yml
    with:
      base-branch: ${{ github.ref_name }}
    secrets: inherit
